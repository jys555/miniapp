<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace Miniapp</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <!-- App Content -->
  <div id="app" class="flex-1"></div>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2">
    <button class="nav-btn active" data-page="home">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </button>
    <button class="nav-btn" data-page="categories">
      <i class="fas fa-th"></i>
      <span>Categories</span>
    </button>
    <button class="nav-btn" data-page="favorites">
      <i class="fas fa-heart"></i>
      <span>Favorites</span>
    </button>
    <button class="nav-btn" data-page="cart">
      <i class="fas fa-shopping-cart"></i>
      <span>Cart</span>
      <span id="nav-cart-count" class="ml-1 text-xs text-white bg-red-500 rounded-full px-1">0</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
