<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Shop WebApp</title>
    <!-- Firebase JS SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <!-- Optional: Add your own CSS -->
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; background: #f6f6f6; margin: 0; padding: 0; }
        header { background: #09c; color: white; padding: 16px; text-align: center; font-size: 1.5rem; }
        nav { background: #fff; padding: 10px 0; text-align: center; }
        nav button { margin: 0 10px; padding: 8px 20px; font-size: 1rem; border: none; background: #09c; color: white; border-radius: 4px; cursor: pointer;}
        nav button.active { background: #007bbf; }
        .container { max-width: 900px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);}
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 18px; }
        .product-card { background: #fafafa; border-radius: 8px; padding: 14px; border: 1px solid #eee; box-shadow: 0 1px 2px rgba(0,0,0,0.03);}
        .product-card img { width: 100%; border-radius: 6px; margin-bottom: 10px; }
        .product-card h3 { margin: 0 0 8px 0; font-size: 1.1rem; }
        .product-card .price { color: #09c; font-weight: bold; margin-bottom: 8px; }
        .product-card .actions { display: flex; justify-content: space-between; align-items: center; }
        .favorite-btn { color: #ff4444; font-size: 1.2rem; background: none; border: none; cursor: pointer; }
        .cart-btn { background: #09c; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
        .category-list { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .category-item { background: #09c; color: white; border-radius: 16px; padding: 6px 16px; cursor: pointer; }
        .category-item.active { background: #007bbf; }
        .cart-section, .favorites-section { margin-top: 30px; }
        .empty { text-align: center; color: #aaa; padding: 40px 0; }
        .user-info { margin-bottom: 16px; color: #666; }
    </style>
</head>
<body>
    <header>
        <span>Telegram Shop WebApp</span>
    </header>
    <nav>
        <button id="homeBtn" class="active">Mahsulotlar</button>
        <button id="favoritesBtn">Sevimlilar</button>
        <button id="cartBtn">Savatcha</button>
    </nav>
    <div class="container">
        <div class="user-info" id="userInfo"></div>
        <!-- Categories -->
        <div class="category-list" id="categoriesGrid"></div>
        <!-- Products -->
        <div class="products-grid" id="productsGrid"></div>
        <!-- Favorites -->
        <div class="favorites-section" id="favoritesSection" style="display:none;"></div>
        <!-- Cart -->
        <div class="cart-section" id="cartSection" style="display:none;"></div>
    </div>

    <script>
 
    // --- App State ---
    const state = {
        currentUser: null,
        products: [],
        categories: [],
        favorites: new Set(),
        cart: {},
        currentCategory: null,
        currentPage: 'home'
    };

    // --- Telegram WebApp simulation ---
    window.Telegram = {
        WebApp: {
            initDataUnsafe: {
                user: {
                    id: '123456789',
                    first_name: 'John',
                    last_name: 'Doe',
                    username: 'johndoe'
                }
            },
            ready: function() {
                console.log('Telegram WebApp is ready');
            }
        }
    };

    // --- User info render ---
    function renderUserInfo() {
        const user = state.currentUser;
        if (!user) return;
        document.getElementById('userInfo').innerHTML = `
            <b>@${user.username}</b> (${user.first_name} ${user.last_name}) | ID: ${user.id}
        `;
    }

    // --- Categories render ---
    function renderCategories() {
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = '';
        state.categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'category-item' + (state.currentCategory === cat.id ? ' active' : '');
            div.textContent = cat.name;
            div.onclick = () => {
                state.currentCategory = (state.currentCategory === cat.id) ? null : cat.id;
                renderCategories();
                renderProducts();
            };
            grid.appendChild(div);
        });
    }

    // --- Products render ---
    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';
        let products = state.products;
        if (state.currentCategory) {
            products = products.filter(p => p.categoryId === state.currentCategory);
        }
        if (products.length === 0) {
            grid.innerHTML = '<div class="empty">Mahsulotlar topilmadi</div>';
            return;
        }
        products.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${prod.imageUrls && prod.imageUrls.length ? prod.imageUrls[0] : 'https://via.placeholder.com/180'}" alt="${prod.name}">
                <h3>${prod.name}</h3>
                <div class="price">${prod.price} so'm</div>
                <div class="actions">
                    <button class="favorite-btn" title="Sevimli" onclick="toggleFavorite('${prod.id}')">
                        ${state.favorites.has(prod.id) ? '♥' : '♡'}
                    </button>
                    <button class="cart-btn" onclick="addToCart('${prod.id}', 1)">Savatchaga</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // --- Favorites render ---
    function renderFavoritesPage() {
        const section = document.getElementById('favoritesSection');
        section.style.display = "block";
        document.getElementById('productsGrid').style.display = "none";
        document.getElementById('cartSection').style.display = "none";
        const favProducts = state.products.filter(p => state.favorites.has(p.id));
        if (favProducts.length === 0) {
            section.innerHTML = '<div class="empty">Sevimli mahsulotlar yo\'q</div>';
            return;
        }
        section.innerHTML = '<h2>Sevimlilar</h2>';
        favProducts.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${prod.imageUrls && prod.imageUrls.length ? prod.imageUrls[0] : 'https://via.placeholder.com/180'}" alt="${prod.name}">
                <h3>${prod.name}</h3>
                <div class="price">${prod.price} so'm</div>
                <div class="actions">
                    <button class="favorite-btn" title="Sevimli" onclick="toggleFavorite('${prod.id}')">
                        ${state.favorites.has(prod.id) ? '♥' : '♡'}
                    </button>
                    <button class="cart-btn" onclick="addToCart('${prod.id}', 1)">Savatchaga</button>
                </div>
            `;
            section.appendChild(card);
        });
    }

    // --- Cart render ---
    function renderCartPage() {
        const section = document.getElementById('cartSection');
        section.style.display = "block";
        document.getElementById('productsGrid').style.display = "none";
        document.getElementById('favoritesSection').style.display = "none";
        const cartItems = Object.values(state.cart);
        if (cartItems.length === 0) {
            section.innerHTML = '<div class="empty">Savatcha bo\'sh</div>';
            return;
        }
        section.innerHTML = '<h2>Savatcha</h2>';
        cartItems.forEach(item => {
            const prod = state.products.find(p => p.id === item.productId);
            section.innerHTML += `
                <div class="product-card">
                    <img src="${prod && prod.imageUrls && prod.imageUrls.length ? prod.imageUrls[0] : 'https://via.placeholder.com/180'}" alt="${prod ? prod.name : ''}">
                    <h3>${prod ? prod.name : 'Mahsulot'}</h3>
                    <div class="price">${prod ? prod.price : '-'} so'm</div>
                    <div>Miqdori: ${item.quantity}</div>
                    <div class="actions">
                        <button class="cart-btn" onclick="removeFromCart('${item.productId}')">O'chirish</button>
                    </div>
                </div>
            `;
        });
    }

    function updateFavoriteButtons() {
        renderProducts();
        if (state.currentPage === 'favorites') {
            renderFavoritesPage();
        }
    }

    function updateCartUI() {
        if (state.currentPage === 'cart') {
            renderCartPage();
        }
    }

    // --- Cart functions ---
    async function addToCart(productId, quantity) {
        const userRef = db.collection('users').doc(state.currentUser.id.toString());
        const userDoc = await userRef.get();
        let cart = userDoc.data().cart || [];
        const idx = cart.findIndex(item => item.productId === productId);
        if (idx >= 0) {
            cart[idx].quantity += quantity;
        } else {
            cart.push({
                productId,
                quantity,
                addedAt: new Date().toISOString()
            });
        }
        await userRef.update({ cart });
        state.cart[productId] = { productId, quantity: cart.find(item => item.productId === productId).quantity };
        updateCartUI();
    }

    async function removeFromCart(productId) {
        const userRef = db.collection('users').doc(state.currentUser.id.toString());
        const userDoc = await userRef.get();
        let cart = userDoc.data().cart || [];
        cart = cart.filter(item => item.productId !== productId);
        await userRef.update({ cart });
        delete state.cart[productId];
        updateCartUI();
    }

    // --- Favorite functions ---
    async function toggleFavorite(productId) {
        const userRef = db.collection('users').doc(state.currentUser.id.toString());
        const userDoc = await userRef.get();
        let favorites = userDoc.data().favorites || [];
        const isFavorite = favorites.includes(productId);

        if (isFavorite) {
            favorites = favorites.filter(id => id !== productId);
            state.favorites.delete(productId);
        } else {
            favorites.push(productId);
            state.favorites.add(productId);
        }

        await userRef.update({ favorites });
        updateFavoriteButtons();
    }

    // --- Data loading ---
    async function ensureUserDocument() {
        const user = window.Telegram.WebApp.initDataUnsafe.user;
        const userRef = db.collection('users').doc(user.id.toString());
        const userDoc = await userRef.get();
        if (!userDoc.exists) {
            await userRef.set({
                id: user.id.toString(),
                username: user.username,
                first_name: user.first_name,
                last_name: user.last_name,
                favorites: [],
                cart: []
            });
        }
    }

    async function loadData() {
        try {
            // Load products
            const productsSnapshot = await db.collection('products').get();
            state.products = productsSnapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));

            // Load categories
            const categoriesSnapshot = await db.collection('categories').get();
            state.categories = categoriesSnapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));

            // Load user favorites and cart arrays
            const userRef = db.collection('users').doc(state.currentUser.id.toString());
            const userDoc = await userRef.get();
            const userData = userDoc.data();

            state.favorites = new Set(userData.favorites || []);
            state.cart = {};
            (userData.cart || []).forEach(item => {
                state.cart[item.productId] = item;
            });

            renderUserInfo();
            renderCategories();
            renderProducts();
        } catch (err) {
            console.error('Xatolik: ', err);
        }
    }

    // --- Event listeners ---
    function setupEventListeners() {
        document.getElementById('homeBtn').onclick = function() {
            state.currentPage = 'home';
            this.classList.add('active');
            document.getElementById('favoritesBtn').classList.remove('active');
            document.getElementById('cartBtn').classList.remove('active');
            document.getElementById('productsGrid').style.display = "grid";
            document.getElementById('favoritesSection').style.display = "none";
            document.getElementById('cartSection').style.display = "none";
            renderCategories();
            renderProducts();
        };
        document.getElementById('favoritesBtn').onclick = function() {
            state.currentPage = 'favorites';
            this.classList.add('active');
            document.getElementById('homeBtn').classList.remove('active');
            document.getElementById('cartBtn').classList.remove('active');
            renderFavoritesPage();
        };
        document.getElementById('cartBtn').onclick = function() {
            state.currentPage = 'cart';
            this.classList.add('active');
            document.getElementById('homeBtn').classList.remove('active');
            document.getElementById('favoritesBtn').classList.remove('active');
            renderCartPage();
        };
    }

    // --- App initialization ---
    async function initApp() {
        // Telegram WebApp simulation
        state.currentUser = window.Telegram.WebApp.initDataUnsafe.user;
        await ensureUserDocument();
        await loadData();
        setupEventListeners();
        window.Telegram.WebApp.ready();
    }

    document.addEventListener('DOMContentLoaded', () => initApp());

    </script>
</body>
</html>
