        // Create Product Card
        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';
            
            const discountedPrice = product.price * (1 - (product.discount / 100));
            
            card.innerHTML = `
                <div style="position: relative;">
                    <img src="${product.imageUrls[0]}" alt="${product.name}" class="product-image">
                    <button class="like-button" data-product-id="${product.id}">
                        <i class="${state.favorites.has(product.id) ? 'fas' : 'far'} fa-heart"></i>
                    </button>
                    ${product.discount > 0 ? `
                        <div class="discount-badge">
                            -${product.discount}%
                        </div>
                    ` : ''}
                </div>
                <div class="product-info">
                    <h3 class="product-name">${product.name}</h3>
                    <div class="product-price">
                        <div>
                            <span class="price-current">$${discountedPrice.toFixed(2)}</span>
                            ${product.discount > 0 ? `<span class="price-original">$${product.price.toFixed(2)}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
            
            // Add event listeners
            const likeButton = card.querySelector('.like-button');
            likeButton.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFavorite(product.id);
            });
            
            card.addEventListener('click', () => {
                state.currentProduct = product;
                switchPage('productDetail');
            });
            
            return card;
        }

// Toggle Favorite (array bilan ishlaydi, subcollection emas)
        // Demo versiya uchun ham local state yangilanadi
        async function toggleFavorite(productId) {
            try {
                const userRef = db.collection('users').doc(state.currentUser.id.toString());
                const userDoc = await userRef.get();
                let favorites = userDoc.data().favorites  [];
                const isFavorite = favorites.includes(productId);

                if (isFavorite) {
                    favorites = favorites.filter(id => id !== productId);
                    state.favorites.delete(productId);
                } else {
                    favorites.push(productId);
                    state.favorites.add(productId);
                }

                // Firestorega yangilash
                await userRef.update({ favorites });

                // UI yangilash
                updateFavoriteButtons();
                if (state.currentPage === 'favorites') {
                    renderFavoritesPage();
                }
            } catch (error) {
                console.error('Error toggling favorite:', error);
                // DEMO uchun local state yangilash
                if (state.favorites.has(productId)) {
                    state.favorites.delete(productId);
                } else {
                    state.favorites.add(productId);
                }
                updateFavoriteButtons();
                if (state.currentPage === 'favorites') {
                    renderFavoritesPage();
                }
            }
        }

        // Update Favorite Buttons
        function updateFavoriteButtons() {
            document.querySelectorAll('.like-button').forEach(button => {
                const productId = button.getAttribute('data-product-id');
                const icon = button.querySelector('i');
                
                if (state.favorites.has(productId)) {
                    icon.className = 'fas fa-heart';
                } else {
                    icon.className = 'far fa-heart';
                }
            });
        }

        // Update Cart Count
        function updateCartCount() {

            elements.cartCount.textContent = count;
        }

            }, 5000);
        }
